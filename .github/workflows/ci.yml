name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/server
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: packages/server/pyproject.toml
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Pytest
        run: pytest -q
      - name: Demo
        run: beear demo

  web-i18n:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Unit tests (EN/VI chrome strings)
        run: node --test packages/web/tests/i18n.test.mjs
      - name: IIFE mirror present
        run: |
          test -f packages/web/assets/i18n.js
          grep -q "BeeARI18n" packages/web/assets/i18n.js
          grep -q "i18n.js" packages/web/index.html
          grep -q "i18n.js" packages/web/studio3d.html
